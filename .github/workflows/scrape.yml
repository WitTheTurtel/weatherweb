name: Scrape School Menu

on:
  schedule:
    - cron: '0 11 * * *'  # 11:00 UTC daily — adjust to run before breakfast in your timezone
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scrape_menu.py

      - name: Commit and push updated menu
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/menu.json
          git diff --quiet --cached || git commit -m "Update menu data"
          git push